<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300" width="500" height="300">
  <defs>
    <radialGradient id="globe" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a6bb5"/>
      <stop offset="60%" stop-color="#0a3d6e"/>
      <stop offset="100%" stop-color="#041a3d"/>
    </radialGradient>
    <radialGradient id="heat1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff6b35" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#ff6b35" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="heat2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff0066" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ff0066" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="500" height="300" fill="#020b18"/>
  <!-- Globe -->
  <circle cx="250" cy="150" r="120" fill="url(#globe)"/>
  <!-- Grid lines -->
  <ellipse cx="250" cy="150" rx="120" ry="30" fill="none" stroke="rgba(0,212,255,0.15)" stroke-width="1"/>
  <ellipse cx="250" cy="150" rx="120" ry="70" fill="none" stroke="rgba(0,212,255,0.1)" stroke-width="1"/>
  <line x1="250" y1="30" x2="250" y2="270" stroke="rgba(0,212,255,0.1)" stroke-width="1"/>
  <line x1="130" y1="150" x2="370" y2="150" stroke="rgba(0,212,255,0.1)" stroke-width="1"/>
  <!-- Heat anomalies -->
  <ellipse cx="200" cy="120" rx="35" ry="22" fill="url(#heat1)"/>
  <ellipse cx="310" cy="170" rx="28" ry="18" fill="url(#heat2)"/>
  <ellipse cx="240" cy="190" rx="20" ry="14" fill="url(#heat1)"/>
  <!-- Outline -->
  <circle cx="250" cy="150" r="120" fill="none" stroke="rgba(0,212,255,0.3)" stroke-width="1.5"/>
  <!-- Satellite -->
  <circle cx="370" cy="80" r="6" fill="#00d4ff"/>
  <line x1="370" y1="80" x2="356" y2="100" stroke="rgba(0,212,255,0.4)" stroke-width="1" stroke-dasharray="4,3"/>
  <!-- Label -->
  <text x="250" y="285" text-anchor="middle" fill="rgba(0,212,255,0.5)" font-size="11" font-family="monospace">ANOMALIAS TÉRMICAS DETECTADAS</text>
</svg>
